name: CI

on:
  push:
    branches: ["release", "main"]
  pull_request:
    branches: ["release", "main"]

jobs:
  # ────────────────────────────────────────────
  # Frontend: TypeScript 型別檢查 + Vite Build
  # ────────────────────────────────────────────
  frontend:
    name: Frontend — tsc + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check & Vite build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ────────────────────────────────────────────
  # Backend: 相依套件安裝 + import 驗證
  # ────────────────────────────────────────────
  backend:
    name: Backend — pip install + import check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify all modules import correctly
        run: |
          python -c "
          import main
          import config
          import models
          import runner
          import imageset
          import mirror_runner
          import tools
          print('All modules imported successfully')
          "

  # ────────────────────────────────────────────
  # Docker: 完整 Image Build 驗證
  # ────────────────────────────────────────────
  docker:
    name: Docker — image build
    runs-on: ubuntu-latest
    needs: [frontend, backend]

    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t ocp-automation-ui:ci .
